<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食地圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --ink: #1a1a2e; --red: #c0392b; --gold: #d4a017; --paper: #faf7f2; }
        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); overflow-x: hidden; margin: 0; }

        nav { background: rgba(26,26,46,0.97); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(212,160,23,0.2); position: sticky; top: 0; z-index: 100; }
        .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 1.25rem; height: 60px; display: flex; justify-content: space-between; align-items: center; }
        .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .nav-logo span { color: var(--gold); }
        .nav-links { display: flex; gap: 0.25rem; }
        .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.78rem; padding: 0.4rem 0.75rem; border-radius: 20px; transition: all 0.25s; white-space: nowrap; }
        .nav-links a:hover { color: #fff; background: rgba(212,160,23,0.2); }

        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
        .hamburger span { display: block; width: 24px; height: 2px; background: #fff; border-radius: 2px; transition: all 0.3s; }
        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        .mobile-menu { display: none; flex-direction: column; background: rgba(26,26,46,0.98); padding: 0.75rem 1rem 1rem; gap: 0.25rem; }
        .mobile-menu.open { display: flex; }
        .mobile-menu a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; padding: 0.6rem 0.75rem; border-radius: 8px; transition: background 0.2s; }
        .mobile-menu a:hover { background: rgba(212,160,23,0.15); }
        @media (max-width: 640px) { .nav-links { display: none; } .hamburger { display: flex; } }

        .page-hero {
            background: linear-gradient(135deg, #0f4c75 0%, #1b6ca8 50%, #1a1a2e 100%);
            padding: 3.5rem 1rem 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .page-hero::before { content: '🗺'; font-size: 8rem; position: absolute; right: -1rem; top: -1rem; opacity: 0.08; }
        .page-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem, 4vw, 2.8rem); color: #fff; font-weight: 900; }
        .page-hero p { color: rgba(255,255,255,0.8); margin-top: 0.5rem; font-size: 0.95rem; }

        .map-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.25rem 3rem;
        }

        .map-wrap {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 32px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .map-wrap iframe {
            width: 100%;
            height: clamp(400px, 65vw, 800px);
            display: block;
            border: none;
        }

        .map-tip {
            background: linear-gradient(90deg, #f0f9ff, #e0f2fe);
            border-top: 1px solid #bae6fd;
            padding: 0.9rem 1.25rem;
            font-size: 0.8rem;
            color: #0369a1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        footer { background: var(--ink); color: rgba(255,255,255,0.5); text-align: center; padding: 2rem 1rem; font-size: 0.8rem; }
        footer strong { color: var(--gold); }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="index.html" class="nav-logo">✈ <span>TOKYO</span> 2026</a>
        <div class="nav-links">
            <a href="index.html"><i class="fa-solid fa-calendar-days"></i> 行程總覽</a>
            <a href="souvenirs.html"><i class="fa-solid fa-gift"></i> 伴手禮清單</a>
            <a href="foodmap.html"><i class="fa-solid fa-map-location-dot"></i> 美食地圖</a>
            <a href="shop.html"><i class="fa-solid fa-bag-shopping"></i> 逛街地圖</a>
        </div>
        <div class="hamburger" id="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </div>
    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html"><i class="fa-solid fa-calendar-days mr-2"></i>行程總覽</a>
        <a href="souvenirs.html"><i class="fa-solid fa-gift mr-2"></i>伴手禮清單</a>
        <a href="foodmap.html"><i class="fa-solid fa-map-location-dot mr-2"></i>美食地圖</a>
        <a href="shop.html"><i class="fa-solid fa-bag-shopping mr-2"></i>逛街地圖</a>
    </div>
</nav>

<div class="page-hero">
    <h1>🗺 美食地圖</h1>
    <p>峰和曼曼精選東京美食全攻略</p>
</div>

<div class="map-container">
    <div class="map-wrap">
        <iframe src="https://www.google.com/maps/d/u/0/embed?mid=1YIteaUXZjDHqvuU_pXmXKbphIMHYAF0&ehbc=2E312F" allowfullscreen loading="lazy"></iframe>
        <div class="map-tip">
            <i class="fa-solid fa-circle-info"></i>
            點擊地圖上的圖示可查看詳細餐廳資訊與導航
        </div>
    </div>
</div>

<footer>
    <p><strong>峰和曼曼</strong> 創造美好回憶 ✈</p>
</footer>

<script>
function toggleMenu() {
    document.getElementById('hamburger').classList.toggle('open');
    document.getElementById('mobileMenu').classList.toggle('open');
}
</script>
</body>
</html>
